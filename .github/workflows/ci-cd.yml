name: DevOps Exam CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ЭТАП 1: ТЕСТИРОВАНИЕ И ЛИНТИНГ
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Тесты для Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Java Tests
        run: |
          cd app1-java
          mvn test

      # Тесты и линтинг для Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies & Lint Tools
        run: |
          cd app2-python
          pip install -r requirements.txt
          pip install flake8

      - name: Run Python Linter (Flake8)
        run: |
          cd app2-python
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Python Tests
        run: |
          cd app2-python
          python -m unittest test_app.py

  # ЭТАП 2: СБОРКА И ПУШ В REGISTRY (GHCR)
  build-and-push:
    needs: test-and-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Этот секрет GitHub создает САМ автоматически, настраивать не нужно

      # Извлекаем метаданные для Docker образов
      - name: Extract Metadata for Java App
        id: meta-java
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/java-app

      - name: Extract Metadata for Python App
        id: meta-python
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/python-app

      # Сборка и отправка образов
      - name: Build and Push Java App
        uses: docker/build-push-action@v5
        with:
          context: ./app1-java
          push: true
          tags: ${{ steps.meta-java.outputs.tags }}, ghcr.io/${{ github.repository }}/java-app:latest

      - name: Build and Push Python App
        uses: docker/build-push-action@v5
        with:
          context: ./app2-python
          push: true
          tags: ${{ steps.meta-python.outputs.tags }}, ghcr.io/${{ github.repository }}/python-app:latest